<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Наші бажання</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Для двох</p>
          <h1>Наші бажання</h1>
          <p class="subtitle">Побачення, смаки, челенджі та історії, які хочеться прожити разом.</p>
        </div>
        <div class="stats" aria-label="Статистика списку">
          <span id="totalCount">0 ідей</span>
          <strong id="doneCount">0 виконано</strong>
        </div>
      </header>

      <section class="workspace" aria-label="Список бажань">
        <nav class="tabs" aria-label="Категорії">
          <button class="tab active" type="button" data-tab="dates" aria-label="Побачення">
            <svg class="tab-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M8 2v4" />
              <path d="M16 2v4" />
              <path d="M3 10h18" />
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <path d="M8 14h.01" />
              <path d="M12 14h.01" />
              <path d="M16 14h.01" />
              <path d="M8 18h.01" />
              <path d="M12 18h.01" />
            </svg>
            <span class="tab-label">Побачення</span>
          </button>
          <button class="tab" type="button" data-tab="food" aria-label="Експерименти з їжею">
            <svg class="tab-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M4 3v8" />
              <path d="M8 3v8" />
              <path d="M4 7h4" />
              <path d="M6 11v10" />
              <path d="M15 3v18" />
              <path d="M15 3c3 2 5 5 5 9h-5" />
            </svg>
            <span class="tab-label">Експерименти з їжею</span>
          </button>
          <button class="tab" type="button" data-tab="challenges" aria-label="Челенджи">
            <svg class="tab-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M8 21h8" />
              <path d="M12 17v4" />
              <path d="M7 4h10v4a5 5 0 0 1-10 0V4Z" />
              <path d="M5 5H3v2a4 4 0 0 0 4 4" />
              <path d="M19 5h2v2a4 4 0 0 1-4 4" />
            </svg>
            <span class="tab-label">Челенджи</span>
          </button>
          <button class="tab" type="button" data-tab="movies" aria-label="Фільми/серіали">
            <svg class="tab-icon" aria-hidden="true" viewBox="0 0 24 24">
              <rect x="3" y="5" width="18" height="14" rx="2" />
              <path d="M7 5v14" />
              <path d="M17 5v14" />
              <path d="M3 9h4" />
              <path d="M17 9h4" />
              <path d="M3 15h4" />
              <path d="M17 15h4" />
            </svg>
            <span class="tab-label">Фільми/серіали</span>
          </button>
        </nav>

        <div class="list-head">
          <div>
            <p class="section-label" id="activeSubtitle">Ідеї для наступних зустрічей</p>
            <h2 id="activeTitle">Побачення</h2>
          </div>
          <button class="add-button" type="button" id="openForm" aria-label="Додати новий пункт">
            <span aria-hidden="true">+</span>
            Додати
          </button>
        </div>

        <form class="idea-form hidden" id="ideaForm">
          <label>
            Опис
            <textarea id="description" rows="3" placeholder="Наприклад: вечірній пікнік біля води" required></textarea>
          </label>
          <label>
            Посилання
            <input id="link" type="text" inputmode="url" placeholder="https://..." required />
          </label>
          <div class="form-actions">
            <button class="ghost-button" type="button" id="cancelForm">Скасувати</button>
            <button class="save-button" type="submit">Зберегти</button>
          </div>
        </form>

        <p class="status-message" id="statusMessage">Підключення до спільного списку...</p>
        <div class="ideas" id="ideasList" aria-live="polite"></div>
      </section>
    </main>

    <template id="ideaTemplate">
      <article class="idea">
        <button class="check" type="button" aria-label="Позначити як виконано"></button>
        <a class="idea-link" target="_blank" rel="noopener noreferrer">
          <span class="idea-description"></span>
          <span class="idea-url"></span>
        </a>
        <button class="delete" type="button" aria-label="Видалити пункт">×</button>
      </article>
    </template>

    <script type="module" src="script.js"></script>
  </body>
</html>
